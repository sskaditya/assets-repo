<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Error - Assetz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
    </style>
</head>
<body class="bg-gray-50">
    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="max-w-md w-full text-center space-y-6">
            <div class="flex justify-center">
                <div class="h-20 w-20 sm:h-24 sm:w-24 rounded-full bg-red-100 flex items-center justify-center">
                    <i data-lucide="server-crash" class="w-10 h-10 sm:w-12 sm:h-12 text-red-600"></i>
                </div>
            </div>
            
            <div class="space-y-2">
                <h1 class="text-3xl sm:text-4xl font-bold text-gray-900">500</h1>
                <h2 class="text-xl sm:text-2xl font-semibold text-gray-900">Server Error</h2>
                <p class="text-sm sm:text-base text-gray-600">
                    Something went wrong on our end. We've been notified and are working to fix it.
                </p>
            </div>
            
            <div class="flex flex-col sm:flex-row gap-3 justify-center">
                <a href="javascript:history.back()" class="inline-flex items-center justify-center gap-2 px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i>
                    <span>Go Back</span>
                </a>
                <a href="/app/dashboard/" class="inline-flex items-center justify-center gap-2 px-4 py-2 text-sm font-medium text-white bg-red-600 border border-red-600 rounded-lg hover:bg-red-700">
                    <i data-lucide="home" class="w-4 h-4"></i>
                    <span>Go to Dashboard</span>
                </a>
            </div>
        </div>
    </div>
    
    <script>
        if (typeof lucide !== 'undefined') {
            lucide.createIcons();
        }
    </script>
</body>
</html>
